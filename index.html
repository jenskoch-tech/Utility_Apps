<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HeadacheTrack Pro</title>
    
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --primary: #2d3436; --accent: #0984e3; --tension: #e67e22; --text: #2d3436; }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #1a1a1a; --card: #2d2d2d; --text: #f0f0f0; --accent: #74b9ff; --tension: #ffb142; }
        }
        body { font-family: -apple-system, system-ui; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 18px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 1.5rem; }
        h2 { font-size: 0.9rem; margin-bottom: 12px; opacity: 0.7; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(95px, 1fr)); gap: 10px; margin-bottom: 20px; }
        button { border: none; padding: 14px 8px; border-radius: 12px; background: #dfe6e9; color: #2d3436; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        button.active { background: var(--accent); color: white; transform: scale(0.96); }
        .btn-tension.active { background: var(--tension); }
        .btn-main { background: var(--accent); color: white; width: 100%; font-size: 1.1rem; padding: 18px; border-radius: 15px; border: none; font-weight: bold; margin-bottom: 10px; }
        
        /* History Item Styling */
        .history-item { padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .history-row { display: flex; justify-content: space-between; align-items: center; }
        .history-meta { font-size: 0.8rem; opacity: 0.8; margin-top: 5px; }
        .history-btns { display: flex; gap: 10px; margin-top: 10px; }
        .small-btn { padding: 6px 12px; font-size: 0.75rem; border-radius: 6px; }

        .tab-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid rgba(0,0,0,0.1); padding-bottom: 30px; }
        .tab-item { flex: 1; text-align: center; padding: 15px; font-size: 0.9rem; opacity: 0.4; font-weight: bold; cursor: pointer; }
        .tab-item.active { opacity: 1; color: var(--accent); }
        .page { display: none; } .page.active { display: block; }
        
        /* PDF specific styling - only visible during export */
        #pdf-export-container { width: 700px; padding: 30px; background: white; color: black; position: fixed; left: -2000px; top: 0; }
        #pdfTable { width: 100%; border-collapse: collapse; color: black; margin-top: 20px; }
        #pdfTable th, #pdfTable td { border: 1px solid #000; padding: 8px; text-align: left; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <!-- LOG PAGE -->
    <div id="logPage" class="page active">
        <h1 id="logTitle">Log Headache</h1>
        <div class="card">
            <h2>Type</h2>
            <div class="grid" id="typeGrid">
                <button onclick="setVal('type', 'Migraine', this)">Migraine</button>
                <button onclick="setVal('type', 'Tension', this)" class="btn-tension">Tension</button>
            </div>
            <h2>Severity (1-5)</h2>
            <div class="grid" id="sevGrid">
                <button onclick="setVal('sev', 1, this)">1</button>
                <button onclick="setVal('sev', 2, this)">2</button>
                <button onclick="setVal('sev', 3, this)">3</button>
                <button onclick="setVal('sev', 4, this)">4</button>
                <button onclick="setVal('sev', 5, this)">5</button>
            </div>
            <h2>Medication</h2>
            <div class="grid" id="medGrid">
                <button onclick="toggleMed('Zomig', this)">Zomig</button>
                <button onclick="toggleMed('Solpadeine', this)">Solpadeine</button>
                <button onclick="toggleMed('Paracetamol', this)">Paracetamol</button>
                <button onclick="toggleMed('Medocalm', this)">Medocalm</button>
                <button onclick="toggleMed('Temesta', this)">Temesta</button>
                <button onclick="toggleMed('Eletriptan', this)">Eletriptan</button>
                <button onclick="toggleMed('None', this)">None</button>
            </div>
            <button id="mainSaveBtn" class="btn-main" onclick="saveLog()">Save Status</button>
            <button id="cancelBtn" class="btn-main" style="display:none; background:#ccc;" onclick="resetUI()">Cancel Edit</button>
        </div>
    </div>

    <!-- HISTORY PAGE -->
    <div id="historyPage" class="page">
        <h1>History</h1>
        <div class="card" id="historyList">Loading...</div>
    </div>

    <!-- REPORT PAGE -->
    <div id="reportPage" class="page">
        <h1>Analysis</h1>
        <div class="card"><h2>Daily Severity</h2><canvas id="uiTimelineChart"></canvas></div>
        <div class="card"><h2>Monthly Summary</h2><canvas id="uiMonthlyChart"></canvas></div>
        <button id="pdfBtn" class="btn-main" onclick="generatePDF()">Export PDF Report</button>
    </div>
</div>

<!-- HIDDEN PDF CONTENT -->
<div id="pdf-export-container">
    <h1 style="color:black">Headache Clinical Report</h1>
    <div id="pdf-table-wrapper">
        <table id="pdfTable">
            <thead><tr><th>DATE</th><th>TYPE</th><th>SEV</th><th>MEDICATION</th></tr></thead>
            <tbody id="pdfTableBody"></tbody>
        </table>
    </div>
</div>

<nav class="tab-bar">
    <div class="tab-item active" onclick="nav('logPage', this)">Log</div>
    <div class="tab-item" onclick="nav('historyPage', this)">History</div>
    <div class="tab-item" onclick="nav('reportPage', this)">Report</div>
</nav>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(()=>{}); }

    const db = new Dexie("HeadacheTrackerDB_V8");
    db.version(1).stores({ logs: '++id, date, type, sev, med' });

    let currentEntry = { id: null, type: '', sev: 0, med: [] };

    function setVal(f, v, el) {
        currentEntry[f] = v;
        el.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function toggleMed(v, el) {
        if (v === 'None') {
            currentEntry.med = ['None'];
            el.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        } else {
            currentEntry.med = currentEntry.med.filter(m => m !== 'None');
            document.querySelectorAll('#medGrid button').forEach(b => { if(b.innerText==='None') b.classList.remove('active'); });
            if (currentEntry.med.includes(v)) {
                currentEntry.med = currentEntry.med.filter(m => m !== v);
                el.classList.remove('active');
            } else {
                currentEntry.med.push(v);
                el.classList.add('active');
            }
        }
    }

    async function saveLog() {
        if (!currentEntry.type || !currentEntry.sev) return alert("Please select Type and Severity");
        const payload = {
            type: currentEntry.type,
            sev: currentEntry.sev,
            med: currentEntry.med,
            date: currentEntry.id ? currentEntry.date : new Date()
        };
        
        try {
            if (currentEntry.id) {
                await db.logs.update(currentEntry.id, payload);
            } else {
                await db.logs.add(payload);
            }
            alert("Success!");
            resetUI();
            nav('historyPage', document.querySelectorAll('.tab-item')[1]);
        } catch (e) { alert("Save Error: " + e); }
    }

    function resetUI() {
        currentEntry = { id: null, type: '', sev: 0, med: [] };
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        document.getElementById('logTitle').innerText = "Log Headache";
        document.getElementById('mainSaveBtn').innerText = "Save Status";
        document.getElementById('cancelBtn').style.display = "none";
    }

    function nav(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        el.classList.add('active');
        if (pageId === 'historyPage') renderHistory();
        if (pageId === 'reportPage') renderCharts();
    }

    async function renderHistory() {
        const logs = await db.logs.orderBy('date').reverse().toArray();
        const list = document.getElementById('historyList');
        if (logs.length === 0) { list.innerHTML = "No entries yet."; return; }
        list.innerHTML = logs.map(l => `
            <div class="history-item">
                <div class="history-row">
                    <div><strong>${new Date(l.date).toLocaleDateString()}</strong> - ${l.type}</div>
                    <div style="font-weight:bold; color:var(--accent)">S:${l.sev}</div>
                </div>
                <div class="history-meta">Meds: ${l.med.length > 0 ? l.med.join(', ') : 'None'}</div>
                <div class="history-btns">
                    <button class="small-btn" style="background:#b2bec3; color:white;" onclick="editItem(${l.id})">Edit</button>
                    <button class="small-btn" style="background:#fab1a0; color:#d63031;" onclick="deleteItem(${l.id})">Delete</button>
                </div>
            </div>
        `).join('');
    }

    async function editItem(id) {
        const item = await db.logs.get(id);
        currentEntry = { ...item };
        nav('logPage', document.querySelectorAll('.tab-item')[0]);
        document.getElementById('logTitle').innerText = "Edit Entry";
        document.getElementById('mainSaveBtn').innerText = "Update Entry";
        document.getElementById('cancelBtn').style.display = "block";

        // Pre-activate buttons
        const highlight = (gridId, val) => {
            document.querySelectorAll(`#${gridId} button`).forEach(b => {
                if(b.innerText == val) b.classList.add('active');
            });
        };
        highlight('typeGrid', item.type);
        highlight('sevGrid', item.sev);
        item.med.forEach(m => highlight('medGrid', m));
    }

    async function deleteItem(id) {
        if (confirm("Delete this entry?")) { await db.logs.delete(id); renderHistory(); }
    }

    let charts = {};
    async function renderCharts() {
        const logs = await db.logs.orderBy('date').toArray();
        const labels = [...new Set(logs.map(l => new Date(l.date).toLocaleDateString()))];
        
        const ctx1 = document.getElementById('uiTimelineChart').getContext('2d');
        if (charts.ui1) charts.ui1.destroy();
        charts.ui1 = new Chart(ctx1, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Migraine', data: labels.map(d => logs.find(l => new Date(l.date).toLocaleDateString() === d && l.type === 'Migraine')?.sev || null), borderColor: '#0984e3', spanGaps: true },
                    { label: 'Tension', data: labels.map(d => logs.find(l => new Date(l.date).toLocaleDateString() === d && l.type === 'Tension')?.sev || null), borderColor: '#e67e22', spanGaps: true }
                ]
            },
            options: { scales: { y: { min: 0, max: 5, ticks: { stepSize: 1 } } } }
        });

        const summary = {};
        logs.forEach(l => {
            const m = new Date(l.date).toLocaleString('default', { month: 'short', year: 'numeric' });
            if (!summary[m]) summary[m] = { Migraine: 0, Tension: 0 };
            summary[m][l.type]++;
        });
        const mLabels = Object.keys(summary);
        const ctx2 = document.getElementById('uiMonthlyChart').getContext('2d');
        if (charts.ui2) charts.ui2.destroy();
        charts.ui2 = new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: mLabels,
                datasets: [
                    { label: 'Migraine', data: mLabels.map(l => summary[l].Migraine), backgroundColor: '#0984e3' },
                    { label: 'Tension', data: mLabels.map(l => summary[l].Tension), backgroundColor: '#e67e22' }
                ]
            },
            options: { scales: { y: { ticks: { stepSize: 1 } } } }
        });
    }

    async function generatePDF() {
        const btn = document.getElementById('pdfBtn');
        btn.innerText = "Generating PDF...";
        btn.disabled = true;

        try {
            const logs = await db.logs.orderBy('date').reverse().toArray();
            document.getElementById('pdfTableBody').innerHTML = logs.map(l => `
                <tr><td>${new Date(l.date).toLocaleDateString()}</td><td>${l.type}</td><td>${l.sev}</td><td>${l.med.join(', ')}</td></tr>
            `).join('');

            const timeImg = document.getElementById('uiTimelineChart').toDataURL('image/png');
            const monthImg = document.getElementById('uiMonthlyChart').toDataURL('image/png');

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Header & Charts
            doc.setFontSize(18);
            doc.text("Headache Clinical Report", 20, 20);
            doc.addImage(timeImg, 'PNG', 15, 30, 180, 75);
            doc.addImage(monthImg, 'PNG', 15, 115, 180, 75);
            
            // Table Page
            doc.addPage();
            doc.setFontSize(14);
            doc.text("Full History Logs", 20, 20);
            
            const tableArea = document.getElementById('pdfTable');
            const canvas = await html2canvas(tableArea, { scale: 2 });
            const tableImg = canvas.toDataURL('image/png');
            
            // Calculate height to maintain ratio
            const imgWidth = 180;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            doc.addImage(tableImg, 'PNG', 15, 30, imgWidth, imgHeight);
            
            doc.save(`Headache_Report_${new Date().toISOString().slice(0,10)}.pdf`);
        } catch (e) {
            alert("PDF Error: " + e);
        } finally {
            btn.innerText = "Export PDF Report";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
